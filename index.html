<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F8;
    --panel:#FFFFFF;
    --border:#E3E6EA;
    --ink:#14181F;
    --muted:#5B6472;
    --navy:#151B2E;
    --navy-soft:#232B42;
    --accent:#2F5FED;
    --accent-soft:#EAEFFE;
    --ok:#1F9254;
    --warn:#C77C1F;
    --danger:#C43E3E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14.5px;line-height:1.5;}
  .shell{display:flex;min-height:100vh;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:220px;flex-shrink:0;background:var(--navy);color:#fff;
    display:flex;flex-direction:column;padding:22px 14px;gap:4px;
  }
  .sidebar .logo{font-weight:700;font-size:16px;letter-spacing:-0.01em;padding:0 10px 20px;color:#fff;}
  .sidebar .logo span{display:block;font-weight:400;font-size:11.5px;color:#9AA4BD;margin-top:2px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
    color:#B7C0D6;font-size:13.5px;font-weight:500;cursor:pointer;transition:background .12s,color .12s;
  }
  .nav-item:hover{background:var(--navy-soft);color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item .n{
    margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
    background:rgba(255,255,255,.12);padding:1px 6px;border-radius:5px;
  }
  .nav-item.active .n{background:rgba(255,255,255,.25);}
  .nav-dot{width:7px;height:7px;border-radius:2px;background:#5A6padx;flex-shrink:0;}
  .sidebar-foot{margin-top:auto;padding:10px;font-size:11px;color:#6B7690;}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;padding:26px 32px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
  .topbar h1{font-size:20px;margin:0 0 3px;font-weight:700;}
  .topbar p{margin:0;color:var(--muted);font-size:13px;}
  .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

  .save-status{
    display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
    padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--panel);
  }
  .save-status .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);}
  .save-status.saving .dot{background:var(--warn);}
  .save-status.error .dot{background:var(--danger);}
  .save-status.error{color:var(--danger);border-color:#F0C6C6;cursor:pointer;}

  .ghost-btn{
    background:var(--panel);border:1px solid var(--border);color:var(--ink);
    padding:8px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
  }
  .ghost-btn:hover{background:#F0F1F4;}

  /* ---------- STAT ROW ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .stat .num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;}
  .stat .lbl{font-size:11.5px;color:var(--muted);margin-top:2px;}

  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel);font-size:13.5px;color:var(--ink);}
  .search:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:#2450CE;}
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .panel{display:none;}
  .panel.active{display:block;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .cards{display:flex;flex-direction:column;gap:8px;}
  .card{background:var(--panel);border:1px solid var(--border);border-left:3px solid #C9CDD6;border-radius:8px;padding:13px 16px;}
  .card.status-en-cours{border-left-color:var(--warn);}
  .card.status-termine, .card.status-acceptee{border-left-color:var(--ok);}
  .card.status-refusee{border-left-color:var(--danger);}

  .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .card-title{font-weight:600;font-size:14.5px;}
  .card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .card-desc{margin-top:7px;font-size:13px;color:var(--ink);}
  .card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}

  select.status-select{font-size:11.5px;border:1px solid var(--border);border-radius:6px;padding:5px 7px;background:var(--bg);color:var(--ink);}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:12.5px;padding:4px 6px;border-radius:5px;cursor:pointer;}
  .icon-btn:hover{background:#F0F1F4;color:var(--danger);}

  .badge-role{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:var(--accent-soft);color:var(--accent);padding:2px 7px;border-radius:5px;margin-left:6px;}

  .empty{text-align:center;padding:38px 20px;color:var(--muted);border:1px dashed var(--border);border-radius:10px;font-size:13px;}

  .form-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;display:none;}
  .form-box.open{display:block;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  label{font-size:11.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
  input[type=text], input[type=date], select, textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Inter';font-size:13.5px;background:var(--bg);color:var(--ink);}
  textarea{resize:vertical;min-height:56px;}
  .form-actions{margin-top:12px;display:flex;gap:8px;}
  .btn-ghost{background:none;border:1px solid var(--border);padding:9px 14px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;}
  .field.full{grid-column:1/-1;}

  @media (max-width:760px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:12px;}
    .sidebar .logo{display:none;}
    .sidebar-foot{display:none;}
    .nav-item{white-space:nowrap;}
    .main{padding:18px;}
    .form-grid{grid-template-columns:1fr;}
  }

  /* ---------- LOCK SCREEN ---------- */
  .lock-screen{
    position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;
  }
  .lock-box{background:var(--panel);border-radius:12px;padding:32px 28px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .lock-box h2{margin:0 0 4px;font-size:17px;}
  .lock-box p{margin:0 0 16px;font-size:12.5px;color:var(--muted);}
  .lock-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;}
  .lock-box button{width:100%;background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13.5px;}
  .lock-error{color:var(--danger);font-size:12px;margin:-4px 0 10px;display:none;}
  .lock-error.show{display:block;}
  .app-hidden{display:none !important;}
</style>

<div class="lock-screen" id="lock-screen">

<script>
  // ---------- MOT DE PASSE D'ÉQUIPE ----------
  // Simple filtre anti-erreur pour les visiteurs occasionnels : ce n'est pas une vraie sécurité
  // (le code source reste lisible par quiconque sait chercher). Ne pas y mettre de données sensibles.
  const TEAM_PASSWORD = "lande9999";
  const UNLOCK_KEY = "asso_landes_unlocked";

  function unlockApp(){
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-shell').classList.remove('app-hidden');
    initFirebaseAndLoad();
  }
  if(localStorage.getItem(UNLOCK_KEY) === 'yes'){
    unlockApp();
  } else {
    document.getElementById('lock-submit').addEventListener('click', tryUnlock);
    document.getElementById('lock-input').addEventListener('keydown', e => { if(e.key==='Enter') tryUnlock(); });
  }
  function tryUnlock(){
    const val = document.getElementById('lock-input').value;
    if(val === TEAM_PASSWORD){
      localStorage.setItem(UNLOCK_KEY, 'yes');
      unlockApp();
    } else {
      document.getElementById('lock-error').classList.add('show');
    }
  }

  // ---------- FIREBASE ----------

    authDomain: "lande-asso.firebaseapp.com",
    projectId: "lande-asso",
    storageBucket: "lande-asso.firebasestorage.app",
    messagingSenderId: "966056871138",
    appId: "1:966056871138:web:26499fff8de9924de94abb"
  };

  let db = null;
  let firestoreReady = false;

  function initFirebaseAndLoad(){
    try{
      if(firebaseConfig.apiKey && firebaseConfig.apiKey !== "COLLE_TA_CLE_ICI"){
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        firestoreReady = true;

      console.error('Firebase non configuré ou erreur d’initialisation', e);
      firestoreReady = false;
    }
    window.__firebaseInitDone = true;
    document.dispatchEvent(new Event('app-boot-ready'));
  }

<script>
(function(){
  let editingId = null;
  const state = { membres: [], missions: [], taches: [], demandes: [] };

  const PAGE_META = {
    membres:{title:'Membres', sub:"L'équipe de l'association"},
    missions:{title:'Missions', sub:'Les missions en cours et à venir'},
    taches:{title:'Tâches', sub:'Le détail opérationnel de chaque mission'},
    demandes:{title:'Demandes clients', sub:'Les sollicitations reçues et leur suivi'}
  };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function matchesSearch(text, q){ return text.toLowerCase().includes(q.toLowerCase()); }

  /* ---------- SAVE STATUS ---------- */
  const saveStatusEl = document.getElementById('save-status');
  const saveLabelEl = document.getElementById('save-label');
  function setSaveStatus(kind, msg){
    saveStatusEl.classList.remove('saving','error');
    if(kind==='saving'){ saveStatusEl.classList.add('saving'); saveLabelEl.textContent = 'Enregistrement...'; }
    else if(kind==='error'){ saveStatusEl.classList.add('error'); saveLabelEl.textContent = msg || 'Échec — cliquer pour réessayer'; }
    else { saveLabelEl.textContent = 'À jour · ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
  }
  let lastFailedSave = null;
  saveStatusEl.addEventListener('click', ()=>{ if(lastFailedSave) lastFailedSave(); });

  const LOCAL_PREFIX = 'asso_landes_';
  let cloudAvailable = false;
  const DOC_REF = () => db.collection('asso-landes').doc('data');

  function setModeBadge(){
    const badge = document.getElementById('mode-badge');
    const label = document.getElementById('mode-label');
    if(cloudAvailable){
      label.textContent = 'Mode équipe (partagé)';
      badge.querySelector('.dot').style.background = 'var(--accent)';
    } else {
      label.textContent = 'Mode local (cet ordinateur)';
      badge.querySelector('.dot').style.background = 'var(--warn)';
    }
  }

  // Charge tout depuis Firestore si dispo, sinon depuis le navigateur local
  async function loadAllRemote(){
    if(firestoreReady){
      try{
        const snap = await DOC_REF().get();
        cloudAvailable = true;
        if(snap.exists){
          const d = snap.data();
          return { membres:d.membres||[], missions:d.missions||[], taches:d.taches||[], demandes:d.demandes||[] };
        }
        return { membres:[], missions:[], taches:[], demandes:[] };
      }catch(e){
        console.error('Firestore indisponible, repli en local', e);
        cloudAvailable = false;
      }
    }
    return {
      membres: JSON.parse(localStorage.getItem(LOCAL_PREFIX+'membres') || '[]'),
      missions: JSON.parse(localStorage.getItem(LOCAL_PREFIX+'missions') || '[]'),
      taches: JSON.parse(localStorage.getItem(LOCAL_PREFIX+'taches') || '[]'),
      demandes: JSON.parse(localStorage.getItem(LOCAL_PREFIX+'demandes') || '[]'),
    };
  }

  // Sauvegarde TOUT l'état (les 4 collections) en une fois — Firestore si dispo, sinon local
  async function persistAll(){
    setSaveStatus('saving');
    try{
      if(cloudAvailable){
        await DOC_REF().set({
          membres: state.membres, missions: state.missions, taches: state.taches, demandes: state.demandes,
          updatedAt: new Date().toISOString()
        }, { merge:true });
      } else {
        localStorage.setItem(LOCAL_PREFIX+'membres', JSON.stringify(state.membres));
        localStorage.setItem(LOCAL_PREFIX+'missions', JSON.stringify(state.missions));
        localStorage.setItem(LOCAL_PREFIX+'taches', JSON.stringify(state.taches));
        localStorage.setItem(LOCAL_PREFIX+'demandes', JSON.stringify(state.demandes));
      }
      setSaveStatus('ok');
      lastFailedSave = null;
    }catch(e){
      console.error('Erreur de sauvegarde', e);
      setSaveStatus('error');
      lastFailedSave = ()=>persistAll();
    }
  }
  // Compatibilité avec le code existant qui appelle saveKey('membres', state.membres) etc.
  async function saveKey(key, value){ state[key] = value; await persistAll(); }

  // Écoute les changements des autres ordis en temps réel et met à jour l'affichage
  function listenForRemoteChanges(){
    if(!firestoreReady) return;
    DOC_REF().onSnapshot(snap=>{
      if(!snap.exists) return;
      const anyFormOpen = document.querySelector('.form-box.open');
      if(anyFormOpen) return; // on ne casse pas une saisie en cours
      const d = snap.data();
      state.membres = d.membres||[]; state.missions = d.missions||[];
      state.taches = d.taches||[]; state.demandes = d.demandes||[];
      renderAll();
    }, err => console.error('Erreur de synchronisation', err));
  }

  async function loadAll(){
    const data = await loadAllRemote();
    Object.assign(state, data);
    setModeBadge();
    renderAll();
    listenForRemoteChanges();
  }

  function renderAll(){
    renderMembres(); renderMissions(); renderTaches(); renderDemandes();
    fillSelectOptions(); updateCounts(); renderStats();
  }
  function updateCounts(){
    document.getElementById('count-membres').textContent = state.membres.length || '';
    document.getElementById('count-missions').textContent = state.missions.length || '';
    document.getElementById('count-taches').textContent = state.taches.length || '';
    document.getElementById('count-demandes').textContent = state.demandes.length || '';
  }

  function currentTab(){ return document.querySelector('.nav-item.active').dataset.tab; }

  function renderStats(){
    const tab = currentTab();
    const row = document.getElementById('stats-row');
    let cells = [];
    if(tab==='membres'){
      cells = [['Membres', state.membres.length]];
    } else if(tab==='missions'){
      const s = state.missions;
      cells = [['Total', s.length], ['À faire', s.filter(x=>x.status==='a-faire').length], ['En cours', s.filter(x=>x.status==='en-cours').length], ['Terminées', s.filter(x=>x.status==='termine').length]];
    } else if(tab==='taches'){
      const s = state.taches;
      cells = [['Total', s.length], ['À faire', s.filter(x=>x.status==='a-faire').length], ['En cours', s.filter(x=>x.status==='en-cours').length], ['Terminées', s.filter(x=>x.status==='termine').length]];
    } else if(tab==='demandes'){
      const s = state.demandes;
      cells = [['Total', s.length], ['Nouvelles', s.filter(x=>x.status==='nouvelle').length], ['En discussion', s.filter(x=>x.status==='en-cours').length], ['Acceptées', s.filter(x=>x.status==='acceptee').length]];
    }
    row.innerHTML = cells.map(([lbl,num])=>`<div class="stat"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`).join('');
  }

  function fillSelectOptions(){
    const missionOpts = ['<option value="">— aucune —</option>'].concat(state.missions.map(m=>`<option value="${m.id}">${escapeHtml(m.title)}</option>`)).join('');
    document.getElementById('t-mission').innerHTML = missionOpts;
    document.getElementById('d-mission').innerHTML = missionOpts;
    const memberOpts = ['<option value="">— non assignée —</option>'].concat(state.membres.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`)).join('');
    document.getElementById('t-assignee').innerHTML = memberOpts;
  }

  /* ---------- MEMBRES ---------- */
  function renderMembres(){
    const q = document.getElementById('search-membres').value.trim();
    const list = document.getElementById('list-membres');
    const items = state.membres.filter(m => !q || matchesSearch(m.name+' '+m.role, q));
    if(!items.length){ list.innerHTML = '<div class="empty">Aucun membre pour l’instant. Ajoute la première personne de l’équipe.</div>'; return; }
    list.innerHTML = items.map(m => `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="card-title">${escapeHtml(m.name)}${m.role ? `<span class="badge-role">${escapeHtml(m.role)}</span>` : ''}</div>
            <div class="card-sub">${[m.phone, m.email].filter(Boolean).map(escapeHtml).join(' · ')}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" onclick="app.editMembre('${m.id}')">Modifier</button>
            <button class="icon-btn" onclick="app.deleteItem('membres','${m.id}')">Suppr.</button>
          </div>
        </div>
        ${m.notes ? `<div class="card-desc">${escapeHtml(m.notes)}</div>` : ''}
      </div>`).join('');
  }
  function openMembreForm(){ document.getElementById('form-membre').classList.add('open'); }
  function closeMembreForm(){
    document.getElementById('form-membre').classList.remove('open');
    ['m-name','m-role','m-phone','m-email','m-notes'].forEach(id=>document.getElementById(id).value='');
    editingId = null;
  }
  function editMembre(id){
    const m = state.membres.find(x=>x.id===id); if(!m) return;
    editingId = id;
    document.getElementById('m-name').value = m.name||'';
    document.getElementById('m-role').value = m.role||'';
    document.getElementById('m-phone').value = m.phone||'';
    document.getElementById('m-email').value = m.email||'';
    document.getElementById('m-notes').value = m.notes||'';
    openMembreForm();
  }
  async function saveMembre(){
    const name = document.getElementById('m-name').value.trim();
    if(!name){ alert('Le nom est obligatoire.'); return; }
    const data = { id: editingId || uid(), name, role: document.getElementById('m-role').value.trim(), phone: document.getElementById('m-phone').value.trim(), email: document.getElementById('m-email').value.trim(), notes: document.getElementById('m-notes').value.trim() };
    if(editingId){ state.membres = state.membres.map(m=>m.id===editingId?data:m); } else { state.membres.push(data); }
    await saveKey('membres', state.membres);
    closeMembreForm(); renderAll();
  }

  /* ---------- MISSIONS ---------- */
  function renderMissions(){
    const q = document.getElementById('search-missions').value.trim();
    const list = document.getElementById('list-missions');
    const items = state.missions.filter(m => !q || matchesSearch(m.title+' '+m.desc, q));
    if(!items.length){ list.innerHTML = '<div class="empty">Aucune mission enregistrée. Crée la première mission de l’asso.</div>'; return; }
    list.innerHTML = items.map(m => `
      <div class="card status-${m.status}">
        <div class="card-top">
          <div>
            <div class="card-title">${escapeHtml(m.title)}</div>
            ${m.due ? `<div class="card-sub">Échéance : ${escapeHtml(m.due)}</div>` : ''}
          </div>
          <div class="card-actions">
            <select class="status-select" onchange="app.setStatus('missions','${m.id}', this.value)">
              ${Object.entries({'a-faire':'À faire','en-cours':'En cours','termine':'Terminé'}).map(([v,l])=>`<option value="${v}" ${m.status===v?'selected':''}>${l}</option>`).join('')}
            </select>
            <button class="icon-btn" onclick="app.editMission('${m.id}')">Modifier</button>
            <button class="icon-btn" onclick="app.deleteItem('missions','${m.id}')">Suppr.</button>
          </div>
        </div>
        ${m.desc ? `<div class="card-desc">${escapeHtml(m.desc)}</div>` : ''}
      </div>`).join('');
  }
  function openMissionForm(){ document.getElementById('form-mission').classList.add('open'); }
  function closeMissionForm(){
    document.getElementById('form-mission').classList.remove('open');
    document.getElementById('mi-title').value=''; document.getElementById('mi-desc').value='';
    document.getElementById('mi-due').value=''; document.getElementById('mi-status').value='a-faire';
    editingId = null;
  }
  function editMission(id){
    const m = state.missions.find(x=>x.id===id); if(!m) return;
    editingId = id;
    document.getElementById('mi-title').value = m.title||'';
    document.getElementById('mi-desc').value = m.desc||'';
    document.getElementById('mi-due').value = m.due||'';
    document.getElementById('mi-status').value = m.status||'a-faire';
    openMissionForm();
  }
  async function saveMission(){
    const title = document.getElementById('mi-title').value.trim();
    if(!title){ alert('Le titre est obligatoire.'); return; }
    const data = { id: editingId || uid(), title, desc: document.getElementById('mi-desc').value.trim(), due: document.getElementById('mi-due').value, status: document.getElementById('mi-status').value };
    if(editingId){ state.missions = state.missions.map(m=>m.id===editingId?data:m); } else { state.missions.push(data); }
    await saveKey('missions', state.missions);
    closeMissionForm(); renderAll();
  }

  /* ---------- TACHES ---------- */
  function renderTaches(){
    const q = document.getElementById('search-taches').value.trim();
    const list = document.getElementById('list-taches');
    const items = state.taches.filter(t => !q || matchesSearch(t.title, q));
    if(!items.length){ list.innerHTML = '<div class="empty">Aucune tâche pour l’instant.</div>'; return; }
    list.innerHTML = items.map(t => {
      const mission = state.missions.find(m=>m.id===t.missionId);
      const assignee = state.membres.find(m=>m.id===t.assigneeId);
      return `
      <div class="card status-${t.status}">
        <div class="card-top">
          <div>
            <div class="card-title">${escapeHtml(t.title)}</div>
            <div class="card-sub">${[mission?('Mission : '+mission.title):null, assignee?('Assignée à '+assignee.name):'Non assignée'].filter(Boolean).map(escapeHtml).join(' · ')}</div>
          </div>
          <div class="card-actions">
            <select class="status-select" onchange="app.setStatus('taches','${t.id}', this.value)">
              ${Object.entries({'a-faire':'À faire','en-cours':'En cours','termine':'Terminé'}).map(([v,l])=>`<option value="${v}" ${t.status===v?'selected':''}>${l}</option>`).join('')}
            </select>
            <button class="icon-btn" onclick="app.editTache('${t.id}')">Modifier</button>
            <button class="icon-btn" onclick="app.deleteItem('taches','${t.id}')">Suppr.</button>
          </div>
        </div>
        ${t.due ? `<div class="card-sub" style="margin-top:6px">Échéance : ${escapeHtml(t.due)}</div>` : ''}
      </div>`;
    }).join('');
  }
  function openTacheForm(){ document.getElementById('form-tache').classList.add('open'); }
  function closeTacheForm(){
    document.getElementById('form-tache').classList.remove('open');
    document.getElementById('t-title').value=''; document.getElementById('t-mission').value='';
    document.getElementById('t-assignee').value=''; document.getElementById('t-due').value='';
    document.getElementById('t-status').value='a-faire';
    editingId = null;
  }
  function editTache(id){
    const t = state.taches.find(x=>x.id===id); if(!t) return;
    editingId = id;
    document.getElementById('t-title').value = t.title||'';
    document.getElementById('t-mission').value = t.missionId||'';
    document.getElementById('t-assignee').value = t.assigneeId||'';
    document.getElementById('t-due').value = t.due||'';
    document.getElementById('t-status').value = t.status||'a-faire';
    openTacheForm();
  }
  async function saveTache(){
    const title = document.getElementById('t-title').value.trim();
    if(!title){ alert('Le nom de la tâche est obligatoire.'); return; }
    const data = { id: editingId || uid(), title, missionId: document.getElementById('t-mission').value, assigneeId: document.getElementById('t-assignee').value, due: document.getElementById('t-due').value, status: document.getElementById('t-status').value };
    if(editingId){ state.taches = state.taches.map(t=>t.id===editingId?data:t); } else { state.taches.push(data); }
    await saveKey('taches', state.taches);
    closeTacheForm(); renderAll();
  }

  /* ---------- DEMANDES ---------- */
  function renderDemandes(){
    const q = document.getElementById('search-demandes').value.trim();
    const list = document.getElementById('list-demandes');
    const items = state.demandes.filter(d => !q || matchesSearch(d.client+' '+d.desc, q));
    if(!items.length){ list.innerHTML = '<div class="empty">Aucune demande de client enregistrée.</div>'; return; }
    list.innerHTML = items.map(d => {
      const mission = state.missions.find(m=>m.id===d.missionId);
      return `
      <div class="card status-${d.status}">
        <div class="card-top">
          <div>
            <div class="card-title">${escapeHtml(d.client)}</div>
            <div class="card-sub">${[d.contact, mission?('Mission liée : '+mission.title):null].filter(Boolean).map(escapeHtml).join(' · ')}</div>
          </div>
          <div class="card-actions">
            <select class="status-select" onchange="app.setStatus('demandes','${d.id}', this.value)">
              ${Object.entries({'nouvelle':'Nouvelle','en-cours':'En discussion','acceptee':'Acceptée','refusee':'Refusée'}).map(([v,l])=>`<option value="${v}" ${d.status===v?'selected':''}>${l}</option>`).join('')}
            </select>
            <button class="icon-btn" onclick="app.editDemande('${d.id}')">Modifier</button>
            <button class="icon-btn" onclick="app.deleteItem('demandes','${d.id}')">Suppr.</button>
          </div>
        </div>
        ${d.desc ? `<div class="card-desc">${escapeHtml(d.desc)}</div>` : ''}
      </div>`;
    }).join('');
  }
  function openDemandeForm(){ document.getElementById('form-demande').classList.add('open'); }
  function closeDemandeForm(){
    document.getElementById('form-demande').classList.remove('open');
    document.getElementById('d-client').value=''; document.getElementById('d-contact').value='';
    document.getElementById('d-desc').value=''; document.getElementById('d-mission').value='';
    document.getElementById('d-status').value='nouvelle';
    editingId = null;
  }
  function editDemande(id){
    const d = state.demandes.find(x=>x.id===id); if(!d) return;
    editingId = id;
    document.getElementById('d-client').value = d.client||'';
    document.getElementById('d-contact').value = d.contact||'';
    document.getElementById('d-desc').value = d.desc||'';
    document.getElementById('d-mission').value = d.missionId||'';
    document.getElementById('d-status').value = d.status||'nouvelle';
    openDemandeForm();
  }
  async function saveDemande(){
    const client = document.getElementById('d-client').value.trim();
    if(!client){ alert('Le nom du client est obligatoire.'); return; }
    const data = { id: editingId || uid(), client, contact: document.getElementById('d-contact').value.trim(), desc: document.getElementById('d-desc').value.trim(), missionId: document.getElementById('d-mission').value, status: document.getElementById('d-status').value };
    if(editingId){ state.demandes = state.demandes.map(d=>d.id===editingId?data:d); } else { state.demandes.push(data); }
    await saveKey('demandes', state.demandes);
    closeDemandeForm(); renderAll();
  }

  /* ---------- SHARED ACTIONS ---------- */
  async function setStatus(kind, id, value){
    state[kind] = state[kind].map(item => item.id===id ? {...item, status:value} : item);
    await saveKey(kind, state[kind]);
    renderAll();
  }
  async function deleteItem(kind, id){
    if(!confirm('Supprimer cet élément ?')) return;
    state[kind] = state[kind].filter(item => item.id!==id);
    await saveKey(kind, state[kind]);
    renderAll();
  }
  window.app = { editMembre, editMission, editTache, editDemande, deleteItem, setStatus };

  /* ---------- EXPORT / IMPORT (filet de sécurité) ---------- */
  document.getElementById('btn-export').addEventListener('click', ()=>{
    const payload = { exportedAt: new Date().toISOString(), ...state };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'sauvegarde-asso-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });
  document.getElementById('btn-import').addEventListener('click', ()=> document.getElementById('file-import').click());
  document.getElementById('file-import').addEventListener('change', async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!confirm('Importer ce fichier va remplacer les données actuelles (membres, missions, tâches, demandes). Continuer ?')) return;
      for(const key of ['membres','missions','taches','demandes']){
        state[key] = Array.isArray(data[key]) ? data[key] : [];
        await saveKey(key, state[key]);
      }
      renderAll();
      alert('Import terminé.');
    }catch(err){
      alert("Ce fichier n'a pas pu être lu. Vérifie qu'il s'agit bien d'une sauvegarde exportée depuis cette appli.");
    }
    e.target.value = '';
  });

  /* ---------- TABS ---------- */
  document.querySelectorAll('.nav-item').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
      const meta = PAGE_META[tab.dataset.tab];
      document.getElementById('page-title').textContent = meta.title;
      document.getElementById('page-sub').textContent = meta.sub;
      renderStats();
    });
  });

  /* ---------- WIRE UP FORMS ---------- */
  document.getElementById('btn-new-membre').addEventListener('click', ()=>{ closeMembreForm(); openMembreForm(); });
  document.getElementById('m-save').addEventListener('click', saveMembre);
  document.getElementById('m-cancel').addEventListener('click', closeMembreForm);
  document.getElementById('search-membres').addEventListener('input', renderMembres);

  document.getElementById('btn-new-mission').addEventListener('click', ()=>{ closeMissionForm(); openMissionForm(); });
  document.getElementById('mi-save').addEventListener('click', saveMission);
  document.getElementById('mi-cancel').addEventListener('click', closeMissionForm);
  document.getElementById('search-missions').addEventListener('input', renderMissions);

  document.getElementById('btn-new-tache').addEventListener('click', ()=>{ closeTacheForm(); openTacheForm(); });
  document.getElementById('t-save').addEventListener('click', saveTache);
  document.getElementById('t-cancel').addEventListener('click', closeTacheForm);
  document.getElementById('search-taches').addEventListener('input', renderTaches);

  document.getElementById('btn-new-demande').addEventListener('click', ()=>{ closeDemandeForm(); openDemandeForm(); });
  document.getElementById('d-save').addEventListener('click', saveDemande);
  document.getElementById('d-cancel').addEventListener('click', closeDemandeForm);
  document.getElementById('search-demandes').addEventListener('input', renderDemandes);

  document.addEventListener('app-boot-ready', loadAll);
  if(window.__firebaseInitDone) loadAll();
})();
</script>
